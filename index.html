<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FJN Digital | Websites Premium que Convierten Visitantes en Clientes</title>
    <meta name="description" content="Creamos websites estratégicos, modernos y optimizados para conversión. Diseño premium, desarrollo profesional y resultados medibles para tu negocio." />
    <meta name="author" content="FJN Digital" />

    <meta property="og:title" content="FJN Digital | Websites Premium que Convierten" />
    <meta property="og:description" content="Creamos websites estratégicos, modernos y optimizados para conversión. Diseño premium para tu negocio." />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Premium Typography: Outfit (ultra-thin luxury) + Inter (clean body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style = 'position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:999999;padding:20px;font-family:monospace;white-space:pre-wrap;';
        errDiv.innerText = 'Early Error: ' + e.message + '\nFile: ' + e.filename + ':' + e.lineno + '\n' + (e.error ? e.error.stack : '');
        if (document.body) { document.body.appendChild(errDiv); } else { window.onload = function() { document.body.appendChild(errDiv); } }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style = 'position:fixed;top:0;left:0;right:0;background:darkred;color:white;z-index:999999;padding:20px;font-family:monospace;white-space:pre-wrap;';
        errDiv.innerText = 'Unhandled Promise: ' + (e.reason ? (e.reason.stack || e.reason.message || e.reason) : 'Unknown reason');
        if (document.body) { document.body.appendChild(errDiv); } else { window.onload = function() { document.body.appendChild(errDiv); } }
      });
    </script>
  </head>

  <body>
    <!-- Hidden Forms for Netlify Forms Crawler Detection on Single Page App -->
    <form name="contact" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <textarea name="goal"></textarea>
      <input type="text" name="date" />
      <input type="text" name="time" />
    </form>

    <form name="pricing-order" data-netlify="true" hidden>
      <input type="text" name="plan" />
      <input type="text" name="addons" />
      <input type="text" name="total" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
